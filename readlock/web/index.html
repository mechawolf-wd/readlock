<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="readlock">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>readlock</title>
  <link rel="manifest" href="manifest.json">

  <!-- Deter copy/selection of course content on web. OS-level screenshots cannot be blocked from a webpage. -->
  <style>
    html, body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    img {
      -webkit-user-drag: none;
      user-drag: none;
    }
    @media print {
      html, body {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAcKL7UCkGiWASDXBs080RjcVt8pPQfc5k",

      projectId: "readlock-production",
      storageBucket: "readlock-production.firebasestorage.app",
      messagingSenderId: "976267746377",

    });
  </script>
  <script>
    // Block right-click menu, drag, copy, cut, and selection events on the page
    document.addEventListener('contextmenu', function (event) { event.preventDefault(); });
    document.addEventListener('dragstart', function (event) { event.preventDefault(); });
    document.addEventListener('copy', function (event) { event.preventDefault(); });
    document.addEventListener('cut', function (event) { event.preventDefault(); });
    document.addEventListener('selectstart', function (event) { event.preventDefault(); });
  </script>
